<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>standby.design</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%234a7aaa' stroke-width='2'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg-page:    #0e0e14;
      --bg-surface: #16162a;
      --border:     #2a2a3a;
      --text-hi:    #e0e0e0;
      --text-mid:   #aaa;
      --text-low:   #777;
      --accent:     #4a7aaa;
      --accent-text:#8cb4ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-hi);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-hi);
    }
    header p {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-low);
      letter-spacing: 0.04em;
    }
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 720px;
    }
    .tool-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .tool-card:hover {
      border-color: var(--accent);
      background: #1a1a2e;
    }
    .tool-card .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-text);
    }
    .tool-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-hi);
    }
    .tool-card p {
      font-size: 0.8rem;
      color: var(--text-mid);
      line-height: 1.5;
    }
    .tool-card.soon {
      opacity: 0.4;
      pointer-events: none;
      cursor: default;
    }
    .tool-card.soon .label {
      color: var(--text-low);
    }
    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: var(--text-low);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <header>
    <h1>standby.design</h1>
    <p>Small tools for designers and developers.</p>
  </header>

  <div class="tools">
    <a href="/color" class="tool-card">
      <span class="label">Color</span>
      <h2>OKLCH Palette Generator</h2>
      <p>Generate perceptually uniform color palettes with OKLCH.</p>
    </a>

    <div class="tool-card soon">
      <span class="label">Coming soon</span>
      <h2>Font Pairing</h2>
      <p>Explore and test typographic combinations.</p>
    </div>
  </div>

  <footer>standby.design</footer>
</body>
</html>
